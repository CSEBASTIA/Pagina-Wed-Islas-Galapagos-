<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promociones — Golden Ray I · Galapagos</title>
    <meta name="description" content="Fechas disponibles y promociones para tours en las Islas Galápagos con Golden Ray I">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/animations.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">
    <div class="fixed inset-0 z-[-1]" aria-hidden="true">
        <img src="./assets/images/fondo de pagina.png" alt="" class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/40"></div>
    </div>

    <header>
        <nav class="bg-white/95 backdrop-blur-sm sticky top-0 z-50 border-b border-gray-100 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-20">
                    <a href="./index.html" class="flex items-center gap-2">
                        <img src="./assets/images/logo-orca.png" alt="Golden Ray Logo" class="h-10 w-10 object-contain">
                        <span class="text-2xl font-bold text-gray-800 tracking-tight">Golden Ray I</span>
                    </a>
                    <div class="hidden md:flex space-x-8">
                        <a href="./index.html" class="text-gray-600 hover:text-cyan-600 font-medium transition">Inicio</a>
                        <a href="./tours.html" class="text-gray-600 hover:text-cyan-600 font-medium transition">Tours</a>
                        <a href="./blog.html" class="text-gray-600 hover:text-cyan-600 font-medium transition">Blog</a>
                        <span class="text-cyan-600 font-semibold border-b-2 border-cyan-500 pb-0.5">Promociones</span>
                        <a href="./contact.html" class="text-gray-600 hover:text-cyan-600 font-medium transition">Contacto</a>
                    </div>
                    <div class="md:hidden">
                        <button id="mobile-menu-btn" class="text-gray-600" aria-label="Abrir menu">
                            <i data-lucide="menu" class="h-7 w-7"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-gray-200 p-4 absolute w-full z-40 shadow-lg">
            <div class="flex flex-col space-y-4">
                <a href="./index.html" class="text-left text-gray-800 font-medium">Inicio</a>
                <a href="./tours.html" class="text-left text-gray-800 font-medium">Tours</a>
                <a href="./blog.html" class="text-left text-gray-800 font-medium">Blog</a>
                <span class="text-cyan-600 font-semibold">Promociones</span>
                <a href="./contact.html" class="text-left text-gray-800 font-medium">Contacto</a>
            </div>
        </div>
    </header>

    <main class="flex-1 bg-white/95 backdrop-blur-[2px]">
        <section class="py-16 md:py-24 px-4 relative overflow-hidden">
            <div class="max-w-4xl mx-auto text-center relative z-10">
                <span class="inline-block mb-3 py-1 px-3 rounded-full bg-amber-100 text-amber-700 text-xs font-bold uppercase tracking-wide">
                    Fechas Disponibles
                </span>
                <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-4">Promociones</h1>
                <p class="text-gray-600 text-lg">Reserva tu lugar en las próximas salidas a las Islas Galápagos</p>
            </div>
        </section>

        <section class="max-w-5xl mx-auto px-4 pb-20">
            <div id="promos-public-list" class="space-y-6">
                <div class="flex justify-center items-center py-16">
                    <div class="flex flex-col items-center gap-3 text-gray-400">
                        <div class="w-8 h-8 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-sm">Cargando promociones...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-white py-10 mt-auto border-t border-gray-800">
        <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-400">
            <p>© Golden Ray I · Isla Isabela</p>
            <div class="flex gap-6">
                <a href="./index.html" class="hover:text-cyan-400 transition">Inicio</a>
                <a href="./tours.html" class="hover:text-cyan-400 transition">Tours</a>
                <a href="./blog.html" class="hover:text-cyan-400 transition">Blog</a>
                <a href="./promociones.html" class="text-amber-400 font-semibold">Promociones</a>
                <a href="./contact.html" class="hover:text-cyan-400 transition">Contacto</a>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="./js/services/promotions.service.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Mobile menu toggle
            const btn = document.getElementById('mobile-menu-btn');
            const menu = document.getElementById('mobile-menu');
            if (btn && menu) {
                btn.addEventListener('click', () => menu.classList.toggle('hidden'));
            }

            if (window.lucide) lucide.createIcons();

            // Load promotions
            const container = document.getElementById('promos-public-list');
            if (!container) return;

            try {
                const promos = await PromotionsService.getAll();

                if (!promos.length) {
                    container.innerHTML = `
                        <div class="text-center py-20">
                            <p class="text-5xl mb-4"></p>
                            <h2 class="text-2xl font-bold text-gray-700 mb-2">Próximamente</h2>
                            <p class="text-gray-500">Estamos preparando nuevas fechas. ¡Vuelve pronto!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = promos.map(p => {
                    const dateObj = new Date(p.date_available + 'T12:00:00');
                    const dateStr = dateObj.toLocaleDateString('es-EC', {
                        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                    });
                    const whatsappMsg = encodeURIComponent(
                        `Hola! Me interesa la promoción del tour "${p.tour_title}" del ${dateStr}. ¿Hay cupos disponibles?`
                    );
                    const whatsappUrl = `https://wa.me/593986931563?text=${whatsappMsg}`;

                    return `
                    <article class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden hover:shadow-xl transition-shadow duration-300">
                        <div class="flex flex-col md:flex-row">
                            <div class="md:w-72 flex-shrink-0">
                                <img src="${p.tour_image || ''}" alt="${p.tour_title || ''}"
                                    class="w-full h-48 md:h-full object-cover"
                                    onerror="this.src='https://placehold.co/400x300/f1f5f9/64748b?text=Tour'">
                            </div>
                            <div class="flex-1 p-6 md:p-8 flex flex-col justify-between">
                                <div>
                                    <div class="flex flex-wrap items-center gap-2 mb-3">
                                        <span class="bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full">
                                            ${p.spots} cupos disponibles
                                        </span>
                                    </div>
                                    <h2 class="text-2xl font-bold text-gray-900 mb-2">${p.tour_title || 'Tour'}</h2>
                                    <div class="flex items-center gap-2 text-cyan-600 font-semibold mb-3">
                                        <i data-lucide="calendar" class="h-5 w-5"></i>
                                        <span class="capitalize">${dateStr}</span>
                                    </div>
                                    ${p.note ? `<p class="text-gray-600 mb-4">${p.note}</p>` : ''}
                                </div>
                                <div class="flex flex-wrap gap-3 mt-4">
                                    <a href="${whatsappUrl}" target="_blank" rel="noopener"
                                        class="inline-flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white font-bold px-6 py-3 rounded-xl transition-colors shadow-md">
                                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                        Reservar por WhatsApp
                                    </a>
                                </div>
                            </div>
                        </div>
                    </article>`;
                }).join('');

                if (window.lucide) lucide.createIcons();
            } catch (e) {
                container.innerHTML = `<p class="text-red-500 text-center py-10">Error al cargar promociones: ${e.message}</p>`;
            }
        });
    </script>
</body>
</html>
